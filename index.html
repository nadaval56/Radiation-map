<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIATION — Live World Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#F7F6F3;--bg2:#ECEAE5;--ink:#1A1916;--ink2:#6B6860;--ink3:#B0AFA9;
  --safe:#5DB87A;--warn:#F5A623;--danger:#E8413B;--hot:#7B2FBE;
  --shadow:0 4px 24px rgba(26,25,22,0.09);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);
  height:100vh;overflow:hidden;display:grid;
  grid-template-rows:54px 1fr;grid-template-columns:310px 1fr;
  grid-template-areas:"hdr hdr" "panel map"}
header{grid-area:hdr;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;border-bottom:1px solid var(--bg2);background:var(--bg);z-index:1000}
.logo{font-weight:800;font-size:15px;letter-spacing:.1em;text-transform:uppercase}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);margin-top:1px}
.live-pill{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;
  font-size:10px;color:var(--ink2);padding:4px 10px;border-radius:20px;
  background:white;border:1px solid var(--bg2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);
  animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.panel{grid-area:panel;background:var(--bg);border-left:1px solid var(--bg2);
  display:flex;flex-direction:column;overflow:hidden}
.sec{padding:11px 13px;border-bottom:1px solid var(--bg2)}
.lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:7px}

/* Mode tabs */
.tabs{display:flex;gap:0;border:1.5px solid var(--bg2);border-radius:10px;overflow:hidden}
.tab{flex:1;padding:7px 0;text-align:center;border:none;background:transparent;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;
  color:var(--ink2);transition:all .15s}
.tab.active{background:var(--ink);color:var(--bg)}

/* Search */
.search-row{display:flex;gap:6px}
.search-input{flex:1;padding:8px 11px;border:1.5px solid var(--bg2);background:white;
  border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--ink)}
.btn{padding:8px 12px;border:none;background:var(--ink);color:var(--bg);
  border-radius:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--bg2)}
.btn-ghost:hover{background:var(--bg2);opacity:1}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bg2);
  background:transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;color:var(--ink2);transition:all .15s}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip:hover:not(.active){border-color:var(--ink3);color:var(--ink)}

/* Status */
.status-bar{display:flex;align-items:center;gap:7px;padding:7px 11px;
  border-radius:10px;background:white;font-family:'DM Mono',monospace;
  font-size:11px;color:var(--ink2);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.status-bar.err{background:rgba(232,65,59,.07);color:var(--danger)}
.status-bar.ok{color:#3a9e5f}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat-card{background:white;border-radius:10px;padding:9px 7px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:-.02em}
.stat-unit{font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.stat-lbl{font-size:9px;color:var(--ink2);margin-top:3px;font-weight:600}

/* Gauge */
.gauge-track{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:7px 0}
.gauge-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1),background 1s;width:0}
.gauge-ticks{display:flex;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3)}
.gauge-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.gauge-dot{width:7px;height:7px;border-radius:50%;background:var(--ink3);flex-shrink:0;transition:background .5s}
.gauge-text{font-size:11px;font-weight:700}

/* Opacity */
.slider-wrap{display:flex;align-items:center;gap:8px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--ink);cursor:pointer}
.slider-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);min-width:28px}

/* List */
.list-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 13px 5px}
.count-badge{font-family:'DM Mono',monospace;font-size:10px;
  background:var(--bg2);color:var(--ink2);padding:2px 8px;border-radius:20px}
.list-scroll{flex:1;overflow-y:auto;padding:4px 8px 10px}
.list-scroll::-webkit-scrollbar{width:3px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:2px}
.m-item{display:flex;align-items:center;gap:9px;padding:7px 8px;
  border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.m-item:hover{background:white;box-shadow:var(--shadow);transform:translateX(-2px)}
.m-item.sel{background:white;box-shadow:var(--shadow)}
.m-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0}
.m-name{font-size:11px;font-weight:700;line-height:1.2}
.m-val{font-family:'DM Mono',monospace;font-size:11px;margin-top:1px}
.m-sub{font-size:9px;color:var(--ink3);margin-top:1px;direction:ltr}
.m-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);flex-shrink:0}
.empty{text-align:center;padding:24px 12px;color:var(--ink3)}
.empty-icon{font-size:24px;margin-bottom:8px}
.empty-text{font-size:12px;line-height:1.6}

/* MAP */
#map{grid-area:map;width:100%;height:100%}
.leaflet-tile-pane{filter:grayscale(10%) brightness(1.02)}
.leaflet-control-zoom{border:none!important;box-shadow:var(--shadow)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:white!important;color:var(--ink)!important;border:none!important}
.leaflet-control-zoom a:hover{background:var(--bg2)!important}
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 8px 32px rgba(0,0,0,.13)!important;padding:0!important;border:none!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip-container{display:none}
.pu{padding:14px 16px;min-width:190px;max-width:250px}
.pu-name{font-weight:800;font-size:13px;margin-bottom:7px}
.pu-val{font-family:'DM Mono',monospace;font-size:27px;letter-spacing:-.03em;line-height:1}
.pu-unit{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);text-transform:uppercase;margin-top:3px}
.pu-div{height:1px;background:var(--bg2);margin:9px 0}
.pu-meta{font-size:11px;color:var(--ink2);line-height:1.8;font-family:'DM Mono',monospace;direction:ltr}
.pu-badge{display:inline-flex;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;margin-top:8px}
.pu-note{font-size:9px;color:var(--ink3);margin-top:8px;line-height:1.5}
.map-legend{position:absolute;bottom:16px;right:12px;z-index:500;background:white;
  border-radius:12px;padding:11px 13px;box-shadow:var(--shadow);
  transform:perspective(600px) rotateY(-2deg) rotateX(1.5deg);transition:transform .3s}
.map-legend:hover{transform:none;box-shadow:0 16px 48px rgba(0,0,0,.12)}
.leg-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--ink2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">☢ Radiation World Map</div>
    <div class="logo-sub">Safecast Live · נקודות עניין מתועדות</div>
  </div>
  <div class="live-pill"><div class="live-dot" id="liveDot"></div><span id="liveLabel">LIVE</span></div>
</header>

<aside class="panel">

  <!-- Mode -->
  <div class="sec">
    <div class="lbl">מצב תצוגה</div>
    <div class="tabs">
      <button class="tab active" id="tabHot" onclick="setMode('hotspots')">📍 נקודות עניין</button>
      <button class="tab" id="tabLive" onclick="setMode('live')">📡 Live Data</button>
    </div>
  </div>

  <!-- HOTSPOTS controls -->
  <div id="hotControls">
    <div class="sec">
      <div class="lbl">סינון קטגוריה</div>
      <div class="chips" id="catChips"></div>
    </div>
    <div class="sec">
      <div class="lbl">שכבת Safecast</div>
      <div class="slider-wrap">
        <span style="font-size:10px;color:var(--ink3)">כבוי</span>
        <input type="range" min="0" max="100" value="70" id="opSlider">
        <span class="slider-val" id="opVal">70%</span>
      </div>
    </div>
  </div>

  <!-- LIVE controls -->
  <div id="liveControls" style="display:none">
    <div class="sec">
      <div class="lbl">חיפוש מיקום</div>
      <div class="search-row">
        <input class="search-input" id="searchInput" placeholder="עיר, מדינה..." type="text" dir="rtl">
        <button class="btn" onclick="searchLocation()">→</button>
        <button class="btn btn-ghost" onclick="useMyLocation()">⌖</button>
      </div>
    </div>
    <div class="sec">
      <div class="lbl">מיקומים מהירים</div>
      <div class="chips" id="locChips"></div>
    </div>
    <div class="sec">
      <div class="lbl">רדיוס</div>
      <div class="chips" id="radChips"></div>
    </div>
    <div class="sec">
      <div class="status-bar" id="statusBar"><span id="sIcon">⏳</span><span id="sMsg">מחכה...</span></div>
    </div>
    <div class="sec">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stCount">—</div><div class="stat-unit">readings</div><div class="stat-lbl">מדידות</div></div>
        <div class="stat-card"><div class="stat-val" id="stAvg">—</div><div class="stat-unit">nSv/h</div><div class="stat-lbl">ממוצע</div></div>
        <div class="stat-card"><div class="stat-val" id="stMax">—</div><div class="stat-unit">nSv/h</div><div class="stat-lbl">מקסימום</div></div>
      </div>
      <div style="margin-top:9px">
        <div class="gauge-track"><div class="gauge-fill" id="gFill"></div></div>
        <div class="gauge-ticks"><span>0</span><span>250</span><span>500</span><span>750</span><span>1000+</span></div>
        <div class="gauge-row"><div class="gauge-dot" id="gDot"></div><div class="gauge-text" id="gText">מחכה</div></div>
      </div>
    </div>
  </div>

  <!-- List -->
  <div class="list-hdr">
    <div class="lbl" style="margin-bottom:0" id="listTitle">נקודות עניין</div>
    <div class="count-badge" id="listCount">0</div>
  </div>
  <div class="list-scroll" id="mainList">
    <div class="empty"><div class="empty-icon">☢</div><div class="empty-text">טוען...</div></div>
  </div>
</aside>

<div id="map"></div>

<script>
const PROXY = 'https://safecast-proxy.onrender.com';

// ── HOTSPOTS DATA ──
const HOTSPOTS = [
  {id:1,  name:'כור צ׳רנוביל',       country:'אוקראינה', lat:51.389, lng:30.099, nsvh:160000, cat:'disaster', icon:'☢', year:2021, source:'IAEA', note:'ממוצע באתר הכור עצמו.'},
  {id:2,  name:'יער אדום — צ׳רנוביל',country:'אוקראינה', lat:51.40,  lng:30.05,  nsvh:500000, cat:'disaster', icon:'🌲', year:2020, source:'Ukraine State', note:'אזור הכי מזוהם בעולם.'},
  {id:3,  name:'פריפיאט',             country:'אוקראינה', lat:51.407, lng:30.054, nsvh:8000,   cat:'disaster', icon:'🏚', year:2019, source:'Safecast', note:'עיר רפאים מ-1986.'},
  {id:4,  name:'כור פוקושימה',        country:'יפן',      lat:37.421, lng:141.032,nsvh:105000, cat:'disaster', icon:'⚡', year:2022, source:'Safecast/TEPCO', note:'אסון 2011.'},
  {id:5,  name:'נאמיה — אזור פינוי',  country:'יפן',      lat:37.48,  lng:141.00, nsvh:3500,   cat:'disaster', icon:'🚧', year:2021, source:'Safecast', note:'חלק מהתושבים חזרו.'},
  {id:6,  name:'טוקיו — שינג׳וקו',   country:'יפן',      lat:35.690, lng:139.700,nsvh:68,     cat:'normal',   icon:'🏙', year:2023, source:'Safecast', note:'חזר לנורמה אחרי 2011.'},
  {id:7,  name:'קיוטו',               country:'יפן',      lat:35.011, lng:135.768,nsvh:55,     cat:'normal',   icon:'⛩', year:2022, source:'Safecast', note:'מערב יפן — רחוק מפוקושימה.'},
  {id:8,  name:'פריז',                country:'צרפת',     lat:48.857, lng:2.347,  nsvh:90,     cat:'normal',   icon:'🗼', year:2023, source:'IRSN', note:'70% חשמל גרעיני בצרפת.'},
  {id:9,  name:'מינכן',               country:'גרמניה',   lat:48.137, lng:11.576, nsvh:120,    cat:'normal',   icon:'🍺', year:2023, source:'BfR', note:'גרמניה סגרה כורים ב-2023.'},
  {id:10, name:'לונדון',              country:'בריטניה',  lat:51.507, lng:-0.128, nsvh:100,    cat:'normal',   icon:'💂', year:2022, source:'PHE', note:'15 כורים פעילים בבריטניה.'},
  {id:11, name:'הלסינקי',             country:'פינלנד',   lat:60.192, lng:24.945, nsvh:180,    cat:'normal',   icon:'🇫🇮', year:2023, source:'STUK', note:'גרניט + רדון = גבוה יחסית.'},
  {id:12, name:'דימונה — סביבות',     country:'ישראל',    lat:30.983, lng:35.148, nsvh:95,     cat:'normal',   icon:'🇮🇱', year:2020, source:'IAEA', note:'קרינת רקע טבעית רגילה.'},
  {id:13, name:'תל אביב',             country:'ישראל',    lat:32.080, lng:34.780, nsvh:70,     cat:'normal',   icon:'🌊', year:2020, source:'IAEA', note:'נמוכה — חוף הים התיכון.'},
  {id:14, name:'דנבר, קולורדו',       country:'ארה״ב',    lat:39.739, lng:-104.984,nsvh:320,   cat:'elevated', icon:'🏔', year:2023, source:'EPA', note:'גובה 1600 מ׳ + גרניט.'},
  {id:15, name:'ניו יורק',            country:'ארה״ב',    lat:40.712, lng:-74.006, nsvh:95,    cat:'normal',   icon:'🗽', year:2023, source:'EPA RadNet', note:'ממוצע עירוני.'},
  {id:16, name:'אתר ניסויי נבדה',     country:'ארה״ב',    lat:37.12,  lng:-116.05, nsvh:1200,  cat:'elevated', icon:'💥', year:2021, source:'DOE', note:'928 ניסויי גרעין 1951–1992.'},
  {id:17, name:'ראמסר',               country:'איראן',    lat:36.910, lng:50.658, nsvh:260000, cat:'natural',  icon:'🌋', year:2020, source:'UNSCEAR', note:'הגבוה בעולם בקרינה טבעית!'},
  {id:18, name:'קרלה, הודו',          country:'הודו',     lat:9.980,  lng:76.330, nsvh:15000,  cat:'natural',  icon:'🏝', year:2019, source:'AERB', note:'חוף עם מינרל מונזייט.'},
  {id:19, name:'גואראפארי, ברזיל',    country:'ברזיל',    lat:-20.676,lng:-40.502,nsvh:18000,  cat:'natural',  icon:'🌴', year:2021, source:'IAEA', note:'חול מונזייט טבעי.'},
  {id:20, name:'ISS — תחנת חלל',      country:'חלל',      lat:51.0,   lng:0.0,    nsvh:640000, cat:'space',    icon:'🛸', year:2023, source:'NASA', note:'~200 mSv/שנה לאסטרונאוט.'},
];

const CATS=[
  {id:'all',label:'הכל',color:'#1A1916'},
  {id:'normal',label:'נורמלי',color:'#5DB87A'},
  {id:'elevated',label:'מוגבר',color:'#F5A623'},
  {id:'disaster',label:'אסון',color:'#E8413B'},
  {id:'natural',label:'טבעי גבוה',color:'#7B2FBE'},
  {id:'space',label:'חלל',color:'#2563EB'},
];
const CAT_COL={normal:'#5DB87A',elevated:'#F5A623',disaster:'#E8413B',natural:'#7B2FBE',space:'#2563EB'};
const QUICK_LOCS=[
  {name:'פוקושימה',lat:37.42,lng:141.03},
  {name:'טוקיו',lat:35.68,lng:139.76},
  {name:'פריז',lat:48.85,lng:2.35},
  {name:'ניו יורק',lat:40.71,lng:-74.01},
  {name:'צ׳רנוביל',lat:51.39,lng:30.10},
];
const RADII=[50,100,200,500];

// ── STATE ──
let mode='hotspots';
let currentCat='all';
let currentRadius=100;
let currentLat=37.42, currentLng=141.03;
let hotMarkers={}, liveMarkers=[];
let selectedHot=null;

// ── MAP ──
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([35,20],3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(map);
L.control.attribution({prefix:false,position:'bottomleft'}).addAttribution('© OpenStreetMap | Safecast').addTo(map);

const scLayer=L.tileLayer('https://tilecache.safecast.org/v1/tiles/{z}/{x}/{y}.png',{
  maxZoom:18,opacity:.70,
  errorTileUrl:'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
}).addTo(map);

document.getElementById('opSlider').addEventListener('input',function(){
  scLayer.setOpacity(this.value/100);
  document.getElementById('opVal').textContent=this.value+'%';
});

map.on('click',e=>{
  if(mode==='live'){currentLat=e.latlng.lat;currentLng=e.latlng.lng;loadLive();}
});

// Legend
const legEl=document.createElement('div');
legEl.className='map-legend';
legEl.innerHTML=`<div class="leg-title">Safecast — קרינה</div>
<div class="leg-row"><div class="leg-dot" style="background:#42C5F4"></div>נמוך</div>
<div class="leg-row"><div class="leg-dot" style="background:#5DB87A"></div>נורמלי</div>
<div class="leg-row"><div class="leg-dot" style="background:#F5A623"></div>מוגבר</div>
<div class="leg-row"><div class="leg-dot" style="background:#E8413B"></div>גבוה</div>
<div class="leg-row"><div class="leg-dot" style="background:#7B2FBE"></div>קיצוני</div>`;
document.getElementById('map').appendChild(legEl);

// ── UTILS ──
function cpmToNSvH(v){return Math.round(parseFloat(v)*9.55)}
function getColor(n){return n<200?'#5DB87A':n<600?'#F5A623':n<10000?'#E8413B':'#7B2FBE'}
function getLabel(n){return n<200?'רמה נורמלית':n<600?'רמה מוגברת':n<10000?'רמה גבוהה':'רמה קיצונית'}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'})}catch{return'—'}}
function compare(n){
  const lines=[];
  if(n<100)lines.push('✓ מתחת לממוצע עולמי (~100)');
  else if(n<350)lines.push('✓ בטווח נורמלי (50–350)');
  const x=Math.round(70000/Math.max(n,1));
  if(x<5000)lines.push('≈ '+x+'× פחות מצילום שיניים');
  return lines.join(' · ');
}
function setStatus(icon,msg,cls){
  document.getElementById('statusBar').className='status-bar '+(cls||'');
  document.getElementById('sIcon').textContent=icon;
  document.getElementById('sMsg').textContent=msg;
  document.getElementById('liveDot').style.background=
    cls==='ok'?'#5DB87A':cls==='err'?'#E8413B':'#F5A623';
}

// ── MODE SWITCH ──
function setMode(m){
  mode=m;
  document.getElementById('tabHot').className='tab'+(m==='hotspots'?' active':'');
  document.getElementById('tabLive').className='tab'+(m==='live'?' active':'');
  document.getElementById('hotControls').style.display=m==='hotspots'?'block':'none';
  document.getElementById('liveControls').style.display=m==='live'?'block':'none';
  document.getElementById('listTitle').textContent=m==='hotspots'?'נקודות עניין':'מדידות חיות';
  if(m==='hotspots'){
    clearLiveMarkers();
    renderHotspots();
    buildHotList();
    map.setView([35,20],3);
  } else {
    clearHotMarkers();
    buildLocChips();
    buildRadChips();
    map.setView([currentLat,currentLng],8);
    loadLive();
  }
}

// ── HOTSPOTS MODE ──
function renderHotspots(){
  clearHotMarkers();
  const filtered=currentCat==='all'?HOTSPOTS:HOTSPOTS.filter(h=>h.cat===currentCat);
  filtered.forEach(h=>{
    if(h.lat===51.0&&h.lng===0.0)return;
    const c=CAT_COL[h.cat]||'#1A1916';
    const sz=h.nsvh>10000?16:12;
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c};
        border:2.5px solid white;box-shadow:0 0 8px ${c},0 2px 6px rgba(0,0,0,.2);cursor:pointer"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
    const m=L.marker([h.lat,h.lng],{icon})
      .bindPopup(makeHotPopup(h),{maxWidth:260})
      .on('click',()=>selectHot(h.id))
      .addTo(map);
    hotMarkers[h.id]=m;
  });
  document.getElementById('listCount').textContent=filtered.length;
}
function clearHotMarkers(){Object.values(hotMarkers).forEach(m=>map.removeLayer(m));hotMarkers={};}
function makeHotPopup(h){
  const c=getColor(h.nsvh);
  return`<div class="pu">
    <div class="pu-name">${h.icon} ${h.name} · ${h.country}</div>
    <div class="pu-val">${h.nsvh.toLocaleString()}</div>
    <div class="pu-unit">nSv/h</div>
    <div class="pu-div"></div>
    <div class="pu-meta"><div>📅 ${h.year} · 📡 ${h.source}</div></div>
    <div class="pu-badge" style="background:${c}18;color:${c}">${getLabel(h.nsvh)}</div>
    <div class="pu-note">${h.note}</div>
    <div class="pu-note" style="margin-top:5px;color:var(--ink2)">${compare(h.nsvh)}</div>
  </div>`;
}
function selectHot(id){
  selectedHot=id;
  document.querySelectorAll('.m-item').forEach(el=>el.classList.toggle('sel',el.dataset.id==id));
}
function jumpToHot(id){
  const h=HOTSPOTS.find(x=>x.id===id);
  if(!h||!hotMarkers[id])return;
  selectHot(id);
  map.flyTo([h.lat,h.lng],10,{duration:1.5});
  setTimeout(()=>hotMarkers[id].openPopup(),1600);
}
function buildHotList(){
  const filtered=currentCat==='all'?HOTSPOTS:HOTSPOTS.filter(h=>h.cat===currentCat);
  document.getElementById('listCount').textContent=filtered.length;
  document.getElementById('mainList').innerHTML=filtered.map(h=>{
    const c=CAT_COL[h.cat]||'#1A1916';
    return`<div class="m-item${selectedHot===h.id?' sel':''}" data-id="${h.id}" onclick="jumpToHot(${h.id})">
      <div class="m-icon" style="background:${c}18">${h.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="m-name">${h.name}</div>
        <div class="m-val" style="color:${getColor(h.nsvh)}">${h.nsvh.toLocaleString()} nSv/h</div>
        <div class="m-sub">${h.country}</div>
      </div>
      <div class="m-date">${h.year}</div>
    </div>`;
  }).join('');
}
function buildCatChips(){
  document.getElementById('catChips').innerHTML=CATS.map(c=>
    `<button class="chip${c.id==='all'?' active':''}" data-id="${c.id}" onclick="setCat('${c.id}',this)">${c.label}</button>`
  ).join('');
}
function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderHotspots();
  buildHotList();
}

// ── LIVE MODE ──
function clearLiveMarkers(){liveMarkers.forEach(m=>map.removeLayer(m));liveMarkers=[];}
function buildLocChips(){
  document.getElementById('locChips').innerHTML=QUICK_LOCS.map((l,i)=>
    `<button class="chip${i===0?' active':''}" onclick="selectLoc(${l.lat},${l.lng},this)">${l.name}</button>`
  ).join('');
}
function buildRadChips(){
  document.getElementById('radChips').innerHTML=RADII.map(r=>
    `<button class="chip${r===currentRadius?' active':''}" onclick="setRadius(${r},this)">${r}km</button>`
  ).join('');
}
function selectLoc(lat,lng,el){
  currentLat=lat;currentLng=lng;
  document.querySelectorAll('#locChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  map.setView([lat,lng],8);
  loadLive();
}
function setRadius(r,el){
  currentRadius=r;
  document.querySelectorAll('#radChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  loadLive();
}
async function loadLive(){
  setStatus('⏳','מתחבר ל-Safecast...',' ');
  clearLiveMarkers();
  resetLiveStats();
  try{
    const url=`${PROXY}/measurements?lat=${currentLat}&lng=${currentLng}&radius=${currentRadius}&limit=500`;
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),20000);
    const res=await fetch(url,{signal:ctrl.signal});
    clearTimeout(t);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const raw=await res.json();
    if(!Array.isArray(raw)||raw.length===0)throw new Error('אין מדידות באזור זה');
    const pts=raw.filter(d=>d.value&&d.latitude&&d.longitude).map(d=>({
      id:d.id,nsvh:cpmToNSvH(d.value),raw:d.value,
      lat:parseFloat(d.latitude),lng:parseFloat(d.longitude),
      date:d.captured_at,device:d.device_id||''
    }));
    renderLive(pts);
  }catch(e){
    setStatus('✗',e.message,'err');
    document.getElementById('mainList').innerHTML=
      `<div class="empty"><div class="empty-icon">☢</div><div class="empty-text">${e.message}<br><button class="btn" style="margin-top:10px" onclick="loadLive()">נסה שוב</button></div></div>`;
    document.getElementById('listCount').textContent='0';
  }
}
function resetLiveStats(){
  ['stCount','stAvg','stMax'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('gFill').style.width='0';
  document.getElementById('gText').textContent='מחכה';
  document.getElementById('gDot').style.background='var(--ink3)';
}
function renderLive(pts){
  const vals=pts.map(p=>p.nsvh).filter(v=>v>0&&v<500000);
  if(!vals.length){setStatus('✗','נתונים לא תקינים','err');return;}
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const max=Math.max(...vals);
  document.getElementById('stCount').textContent=pts.length;
  document.getElementById('stAvg').textContent=avg.toLocaleString();
  document.getElementById('stMax').textContent=max.toLocaleString();
  const col=getColor(avg);
  document.getElementById('gFill').style.width=Math.min((avg/1000)*100,100)+'%';
  document.getElementById('gFill').style.background=col;
  document.getElementById('gDot').style.background=col;
  document.getElementById('gText').textContent=getLabel(avg)+' — '+avg.toLocaleString()+' nSv/h';
  setStatus('✓',pts.length+' מדידות נטענו','ok');
  document.getElementById('listCount').textContent=pts.length;

  pts.forEach(p=>{
    if(isNaN(p.lat)||isNaN(p.lng))return;
    const c=getColor(p.nsvh);
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:11px;height:11px;border-radius:50%;background:${c};
        border:2px solid white;box-shadow:0 0 6px ${c},0 2px 5px rgba(0,0,0,.2)"></div>`,
      iconSize:[11,11],iconAnchor:[5.5,5.5]
    });
    const m=L.marker([p.lat,p.lng],{icon})
      .bindPopup(`<div class="pu">
        <div class="pu-val">${p.nsvh.toLocaleString()}</div>
        <div class="pu-unit">nSv/h · ${parseFloat(p.raw).toFixed(1)} CPM</div>
        <div class="pu-div"></div>
        <div class="pu-meta"><div>📍 ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
          <div>📅 ${fmtDate(p.date)}</div>${p.device?'<div>📡 Device #'+p.device+'</div>':''}</div>
        <div class="pu-badge" style="background:${getColor(p.nsvh)}18;color:${getColor(p.nsvh)}">${getLabel(p.nsvh)}</div>
      </div>`,{maxWidth:220})
      .addTo(map);
    liveMarkers.push(m);
  });

  const sorted=[...pts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('mainList').innerHTML=sorted.slice(0,80).map(p=>
    `<div class="m-item" onclick="map.flyTo([${p.lat},${p.lng}],13,{duration:1})">
      <div class="m-icon" style="background:${getColor(p.nsvh)}18;font-size:10px">☢</div>
      <div style="flex:1;min-width:0">
        <div class="m-val" style="color:${getColor(p.nsvh)}">${p.nsvh.toLocaleString()} <span style="font-size:9px;color:var(--ink3)">nSv/h</span></div>
        <div class="m-sub">${p.lat.toFixed(3)}, ${p.lng.toFixed(3)}</div>
      </div>
      <div class="m-date">${fmtDate(p.date)}</div>
    </div>`).join('');
}

// ── SEARCH ──
async function searchLocation(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  setStatus('⏳','מחפש...',' ');
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data=await res.json();
    if(data&&data[0]){
      currentLat=parseFloat(data[0].lat);currentLng=parseFloat(data[0].lon);
      map.setView([currentLat,currentLng],8);
      loadLive();
    }else setStatus('✗','מיקום לא נמצא','err');
  }catch(e){setStatus('✗','שגיאת חיפוש','err')}
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchLocation()});
function useMyLocation(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;
    map.setView([currentLat,currentLng],9);
    loadLive();
  });
}

// ── INIT ──
buildCatChips();
renderHotspots();
buildHotList();
setTimeout(()=>jumpToHot(4),600);
</script>
</body>
