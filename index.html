<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIATION — Safecast Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #F7F6F3;
    --bg2: #EFEDE8;
    --ink: #1A1916;
    --ink2: #6B6860;
    --ink3: #B0AFA9;
    --accent: #C8FF00;
    --accent-dim: rgba(200,255,0,0.15);
    --safe: #5DB87A;
    --warn: #F5A623;
    --danger: #E8413B;
    --card-shadow: 0 8px 40px rgba(26,25,22,0.08), 0 2px 8px rgba(26,25,22,0.05);
    --card-shadow-hover: 0 20px 60px rgba(26,25,22,0.14), 0 4px 16px rgba(26,25,22,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 340px 1fr;
    grid-template-areas:
      "header header"
      "panel  map";
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--bg2);
    background: var(--bg);
    z-index: 1000;
    position: relative;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ink);
    display: grid; place-items: center;
    position: relative;
    animation: pulse-logo 3s ease-in-out infinite;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    animation: ring-expand 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(0.92); }
  }
  @keyframes ring-expand {
    0%{ transform: scale(1); opacity: 0.4; }
    100%{ transform: scale(2.2); opacity: 0; }
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .logo-text { font-weight: 800; font-size: 15px; letter-spacing: 0.1em; text-transform: uppercase; }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); letter-spacing: 0.05em; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink2);
    text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--safe);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.2; }
  }
  .source-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink3);
    text-decoration: none;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--ink3);
    padding-bottom: 1px;
    transition: color 0.2s;
  }
  .source-link:hover { color: var(--ink); }

  /* ── PANEL ── */
  .panel {
    grid-area: panel;
    background: var(--bg);
    border-left: 1px solid var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    box-shadow: 4px 0 24px rgba(26,25,22,0.04);
  }

  .panel-search {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--bg2);
  }
  .search-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--bg2);
    background: white;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,25,22,0.06);
  }
  .btn {
    padding: 10px 16px;
    border: none;
    background: var(--ink);
    color: var(--bg);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: #333; }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    color: var(--ink2);
    border: 1.5px solid var(--bg2);
  }
  .btn-ghost:hover { background: var(--bg2); color: var(--ink); }

  .radius-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
  }
  .radius-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    margin-left: 4px;
  }
  .radius-chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--bg2);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    color: var(--ink2);
    transition: all 0.15s;
  }
  .radius-chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .radius-chip:hover:not(.active) { border-color: var(--ink3); color: var(--ink); }

  /* ── STATS ── */
  .panel-stats {
    padding: 16px 20px;
    border-bottom: 1px solid var(--bg2);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(26,25,22,0.04);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--card-shadow);
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .stat-value.loading { color: var(--ink3); font-size: 14px; }
  .stat-unit {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--ink2);
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── LEVEL GAUGE ── */
  .panel-gauge {
    padding: 16px 20px;
    border-bottom: 1px solid var(--bg2);
  }
  .gauge-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }
  .gauge-track {
    height: 6px;
    background: var(--bg2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .gauge-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1), background 1s;
    background: var(--safe);
    width: 0%;
  }
  .gauge-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .gauge-tick {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--ink3);
  }
  .gauge-status {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gauge-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--safe);
    transition: background 0.5s;
    flex-shrink: 0;
  }
  .gauge-status-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    transition: color 0.5s;
  }

  /* ── MEASUREMENTS LIST ── */
  .panel-list-header {
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-list-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
  }
  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--bg2);
    color: var(--ink2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .panel-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 16px;
  }
  .panel-list::-webkit-scrollbar { width: 4px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 2px; }

  .measurement-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    margin-bottom: 2px;
  }
  .measurement-item:hover {
    background: white;
    transform: translateX(-3px);
    box-shadow: var(--card-shadow);
  }
  .m-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .m-info { flex: 1; min-width: 0; }
  .m-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    font-weight: 400;
  }
  .m-location {
    font-size: 10px;
    color: var(--ink3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
    direction: ltr;
  }
  .m-date {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--ink3);
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink3);
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-text { font-size: 13px; line-height: 1.5; }

  /* ── MAP ── */
  #map {
    grid-area: map;
    width: 100%;
    height: 100%;
  }

  .leaflet-container {
    background: var(--bg) !important;
  }

  /* Custom marker */
  .rad-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }
  .rad-marker:hover { transform: scale(1.4); }
  .rad-marker.safe { background: var(--safe); }
  .rad-marker.warn { background: var(--warn); }
  .rad-marker.danger { background: var(--danger); }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: white;
    border-radius: 14px !important;
    box-shadow: var(--card-shadow) !important;
    border: none !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip-container { display: none; }
  .popup-card {
    padding: 16px 18px;
    min-width: 200px;
  }
  .popup-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }
  .popup-unit {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .popup-divider {
    height: 1px;
    background: var(--bg2);
    margin: 12px 0;
  }
  .popup-meta { font-size: 11px; color: var(--ink2); line-height: 1.8; direction: ltr; }
  .popup-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
  }
  .popup-status.safe { background: rgba(93,184,122,0.15); color: var(--safe); }
  .popup-status.warn { background: rgba(245,166,35,0.15); color: var(--warn); }
  .popup-status.danger { background: rgba(232,65,59,0.15); color: var(--danger); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(247,246,243,0.9);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .loading-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .spinner {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--bg2);
    border-top-color: var(--ink);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink2);
  }

  /* Tooltip 3D card for legend */
  .map-legend {
    position: absolute;
    bottom: 28px;
    right: 16px;
    z-index: 500;
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    transform: perspective(600px) rotateY(-3deg) rotateX(2deg);
    transition: transform 0.3s;
  }
  .map-legend:hover {
    transform: perspective(600px) rotateY(0deg) rotateX(0deg);
    box-shadow: var(--card-shadow-hover);
  }
  .legend-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink2);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-dot.safe { background: var(--safe); box-shadow: 0 0 5px var(--safe); }
  .legend-dot.warn { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
  .legend-dot.danger { background: var(--danger); box-shadow: 0 0 5px var(--danger); }

  .leaflet-control-zoom {
    border: none !important;
    box-shadow: var(--card-shadow) !important;
    border-radius: 10px !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: white !important;
    color: var(--ink) !important;
    border: none !important;
    font-size: 16px !important;
    line-height: 26px !important;
    width: 28px !important;
    height: 28px !important;
    transition: background 0.15s !important;
  }
  .leaflet-control-zoom a:hover { background: var(--bg2) !important; }

  .leaflet-tile-pane { filter: grayscale(20%) brightness(1.02); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><div class="logo-dot"></div></div>
    <div>
      <div class="logo-text">Radiation</div>
      <div class="logo-sub">Powered by Safecast</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      Live Data
    </div>
    <a class="source-link" href="https://safecast.org" target="_blank">safecast.org</a>
  </div>
</header>

<aside class="panel">
  <div class="panel-search">
    <div class="search-label">חיפוש מיקום</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="עיר, מדינה, קואורדינטות..." type="text" dir="rtl">
      <button class="btn" onclick="searchLocation()">→</button>
      <button class="btn btn-ghost" onclick="useMyLocation()" title="מיקום נוכחי">⌖</button>
    </div>
    <div class="radius-row">
      <span class="radius-label">רדיוס:</span>
      <button class="radius-chip" data-r="20" onclick="setRadius(20,this)">20km</button>
      <button class="radius-chip" data-r="50" onclick="setRadius(50,this)">50km</button>
      <button class="radius-chip active" data-r="100" onclick="setRadius(100,this)">100km</button>
      <button class="radius-chip" data-r="200" onclick="setRadius(200,this)">200km</button>
    </div>
  </div>

  <div class="panel-stats">
    <div class="stat-card">
      <div class="stat-value loading" id="statCount">—</div>
      <div class="stat-unit">readings</div>
      <div class="stat-label">מדידות</div>
    </div>
    <div class="stat-card">
      <div class="stat-value loading" id="statAvg">—</div>
      <div class="stat-unit">nSv/h</div>
      <div class="stat-label">ממוצע</div>
    </div>
    <div class="stat-card">
      <div class="stat-value loading" id="statMax">—</div>
      <div class="stat-unit">nSv/h</div>
      <div class="stat-label">מקסימום</div>
    </div>
  </div>

  <div class="panel-gauge">
    <div class="gauge-label">רמת רקע — אזור נבחר</div>
    <div class="gauge-track">
      <div class="gauge-fill" id="gaugeFill"></div>
    </div>
    <div class="gauge-ticks">
      <span class="gauge-tick">0</span>
      <span class="gauge-tick">100</span>
      <span class="gauge-tick">250</span>
      <span class="gauge-tick">500</span>
      <span class="gauge-tick">1000+</span>
    </div>
    <div class="gauge-status">
      <div class="gauge-status-dot" id="statusDot"></div>
      <div class="gauge-status-text" id="statusText">מחכה לנתונים...</div>
    </div>
  </div>

  <div class="panel-list-header">
    <div class="panel-list-title">מדידות אחרונות</div>
    <div class="count-badge" id="listCount">0</div>
  </div>
  <div class="panel-list" id="measurementList">
    <div class="empty-state">
      <div class="empty-icon">☢</div>
      <div class="empty-text">חפש מיקום או לחץ על המפה<br>כדי לטעון נתוני קרינה</div>
    </div>
  </div>
</aside>

<div id="map"></div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">FETCHING RADIATION DATA...</div>
</div>

<script>
// ── MAP INIT ──
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([37.42, 141.03], 8); // Fukushima default

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

// Custom attribution small
L.control.attribution({ prefix: false, position: 'bottomleft' })
  .addAttribution('© OpenStreetMap | Safecast')
  .addTo(map);

// Legend
const legendEl = document.createElement('div');
legendEl.className = 'map-legend';
legendEl.innerHTML = `
  <div class="legend-title">קרינת רקע</div>
  <div class="legend-row"><div class="legend-dot safe"></div>&lt; 200 nSv/h — נורמלי</div>
  <div class="legend-row"><div class="legend-dot warn"></div>200–600 nSv/h — מוגבר</div>
  <div class="legend-row"><div class="legend-dot danger"></div>&gt; 600 nSv/h — גבוה</div>
`;
document.getElementById('map').appendChild(legendEl);

// ── STATE ──
let currentRadius = 100;
let markers = [];
let currentLat = 37.42;
let currentLng = 141.03;

// ── UTILS ──
function cpmToNSvH(cpm) {
  return Math.round(cpm * 9.55); // standard conversion factor
}

function getLevel(nsvh) {
  if (nsvh < 200) return 'safe';
  if (nsvh < 600) return 'warn';
  return 'danger';
}

function getLevelLabel(nsvh) {
  if (nsvh < 200) return 'רמה נורמלית';
  if (nsvh < 600) return 'רמה מוגברת';
  return 'רמה גבוהה';
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit' });
}

function setLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('visible', on);
}

// ── RADIUS ──
function setRadius(r, el) {
  currentRadius = r;
  document.querySelectorAll('.radius-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  fetchData(currentLat, currentLng);
}

// ── SEARCH ──
async function searchLocation() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data = await res.json();
    if (data && data[0]) {
      const { lat, lon, display_name } = data[0];
      currentLat = parseFloat(lat);
      currentLng = parseFloat(lon);
      map.setView([currentLat, currentLng], 9);
      fetchData(currentLat, currentLng);
    } else {
      alert('מיקום לא נמצא');
    }
  } catch(e) {
    alert('שגיאה בחיפוש מיקום');
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchLocation();
});

function useMyLocation() {
  if (!navigator.geolocation) return alert('גיאולוקציה לא נתמכת');
  navigator.geolocation.getCurrentPosition(pos => {
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;
    map.setView([currentLat, currentLng], 10);
    fetchData(currentLat, currentLng);
  }, () => alert('לא ניתן לקבל מיקום'));
}

map.on('click', e => {
  currentLat = e.latlng.lat;
  currentLng = e.latlng.lng;
  fetchData(currentLat, currentLng);
  // Place a crosshair
  L.circle([currentLat, currentLng], {
    radius: currentRadius * 1000,
    color: '#1A1916',
    weight: 1,
    fill: false,
    dashArray: '4,6',
    opacity: 0.3
  }).addTo(map);
});

// ── FETCH DATA ──
function setStatus(icon, text, color) {
  document.getElementById('statusDot').style.background = color;
  document.getElementById('statusText').textContent = icon + ' ' + text;
}

async function fetchData(lat, lng) {
  setLoading(true);
  setStatus('', 'מתחבר ל-Safecast...', '#B0AFA9');
  clearMarkers();

  const base = 'https://api.safecast.org/measurements.json?latitude=' + lat + '&longitude=' + lng + '&distance=' + currentRadius + '&limit=500';

  // Safecast blocks direct browser fetch (no CORS headers) — must use proxy
  const tries = [
    { name: 'proxy1', url: 'https://corsproxy.io/?' + encodeURIComponent(base) },
    { name: 'proxy2', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(base) },
    { name: 'direct', url: base },
  ];

  let data = null;

  for (let i = 0; i < tries.length; i++) {
    const { name, url } = tries[i];
    try {
      setStatus('', 'מתחבר... (' + (i+1) + '/3)', '#B0AFA9');
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 14000);
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      // allorigins wraps in {contents: "..."}
      const parsed = name === 'proxy2' ? JSON.parse(json.contents) : json;
      if (Array.isArray(parsed) && parsed.length > 0) { data = parsed; break; }
    } catch(e) { /* try next */ }
  }

  setLoading(false);

  if (!data || !data.length) {
    setStatus('✗', 'לא הגיעו נתונים — נסה שוב', '#E8413B');
    showEmpty('כל 3 נתיבי החיבור נכשלו.\nהAPI עובד (בדק ישירות בדפדפן):\n' + base);
    return;
  }

  renderData(data);
}

  renderData(data);
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function renderData(data) {
  // Convert & filter valid
  const points = data
    .filter(d => d.value && d.latitude && d.longitude)
    .map(d => ({
      ...d,
      nsvh: cpmToNSvH(parseFloat(d.value))
    }));

  // Stats
  const vals = points.map(p => p.nsvh);
  const avg = Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
  const max = Math.max(...vals);

  document.getElementById('statCount').textContent = points.length;
  document.getElementById('statCount').classList.remove('loading');
  document.getElementById('statAvg').textContent = avg.toLocaleString();
  document.getElementById('statAvg').classList.remove('loading');
  document.getElementById('statMax').textContent = max.toLocaleString();
  document.getElementById('statMax').classList.remove('loading');

  // Gauge
  const gaugeVal = Math.min((avg / 1000) * 100, 100);
  const gf = document.getElementById('gaugeFill');
  const level = getLevel(avg);
  const colors = { safe: '#5DB87A', warn: '#F5A623', danger: '#E8413B' };
  gf.style.width = gaugeVal + '%';
  gf.style.background = colors[level];
  document.getElementById('statusDot').style.background = colors[level];
  setStatus('✓', getLevelLabel(avg) + ' — ' + avg + ' nSv/h ממוצע', colors[level]);

  // Markers
  points.forEach(p => {
    const lvl = getLevel(p.nsvh);
    const icon = L.divIcon({
      className: '',
      html: `<div class="rad-marker ${lvl}"></div>`,
      iconSize: [14,14],
      iconAnchor: [7,7]
    });
    const m = L.marker([p.latitude, p.longitude], { icon })
      .bindPopup(popupHTML(p), { maxWidth: 260, className: '' })
      .addTo(map);
    markers.push(m);
  });

  // List
  const sorted = [...points].sort((a,b) => new Date(b.captured_at) - new Date(a.captured_at)).slice(0,50);
  renderList(sorted);
  document.getElementById('listCount').textContent = points.length;
}

function popupHTML(p) {
  const lvl = getLevel(p.nsvh);
  const labels = { safe: '✓ רמה נורמלית', warn: '⚠ רמה מוגברת', danger: '⚡ רמה גבוהה' };
  return `<div class="popup-card">
    <div class="popup-value">${p.nsvh.toLocaleString()}</div>
    <div class="popup-unit">nSv/h  ·  ${parseFloat(p.value).toFixed(2)} CPM</div>
    <div class="popup-divider"></div>
    <div class="popup-meta">
      <div>📍 ${p.latitude.toFixed(4)}, ${p.longitude.toFixed(4)}</div>
      <div>📅 ${formatDate(p.captured_at)}</div>
      ${p.device_id ? `<div>📡 Device ${p.device_id}</div>` : ''}
    </div>
    <div class="popup-status ${lvl}">${labels[lvl]}</div>
  </div>`;
}

function renderList(points) {
  const list = document.getElementById('measurementList');
  const colors = { safe: '#5DB87A', warn: '#F5A623', danger: '#E8413B' };
  list.innerHTML = points.map((p, i) => `
    <div class="measurement-item" onclick="flyTo(${p.latitude},${p.longitude})">
      <div class="m-dot" style="background:${colors[getLevel(p.nsvh)]};color:${colors[getLevel(p.nsvh)]}"></div>
      <div class="m-info">
        <div class="m-value">${p.nsvh.toLocaleString()} <span style="font-size:9px;color:var(--ink3)">nSv/h</span></div>
        <div class="m-location">${p.latitude.toFixed(3)}, ${p.longitude.toFixed(3)}</div>
      </div>
      <div class="m-date">${formatDate(p.captured_at)}</div>
    </div>
  `).join('');
}

function flyTo(lat, lng) {
  map.flyTo([lat, lng], 13, { duration: 1.2 });
}

function showEmpty(msg) {
  document.getElementById('measurementList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">☢</div>
      <div class="empty-text">${msg}</div>
    </div>`;
  document.getElementById('listCount').textContent = '0';
  document.getElementById('statCount').textContent = '—';
  document.getElementById('statAvg').textContent = '—';
  document.getElementById('statMax').textContent = '—';
}
