<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIATION — Live Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#F7F6F3;--bg2:#ECEAE5;--ink:#1A1916;--ink2:#6B6860;--ink3:#B0AFA9;
  --safe:#5DB87A;--warn:#F5A623;--danger:#E8413B;--shadow:0 4px 20px rgba(26,25,22,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);
  height:100vh;overflow:hidden;display:grid;
  grid-template-rows:54px 1fr;grid-template-columns:320px 1fr;
  grid-template-areas:"header header" "panel map"}
header{grid-area:header;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--bg2);background:var(--bg);z-index:1000}
.logo-text{font-weight:800;font-size:15px;letter-spacing:.1em;text-transform:uppercase}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);margin-top:1px}
.live-pill{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;
  font-size:10px;color:var(--ink2);padding:4px 10px;border-radius:20px;
  background:white;border:1px solid var(--bg2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);
  animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.panel{grid-area:panel;background:var(--bg);border-left:1px solid var(--bg2);
  display:flex;flex-direction:column;overflow:hidden}
.sec{padding:12px 14px;border-bottom:1px solid var(--bg2)}
.lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:7px}
.search-row{display:flex;gap:6px}
.search-input{flex:1;padding:8px 11px;border:1.5px solid var(--bg2);background:white;
  border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--ink)}
.btn{padding:8px 13px;border:none;background:var(--ink);color:var(--bg);
  border-radius:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.8}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--bg2);padding:8px 10px}
.btn-ghost:hover{background:var(--bg2);opacity:1}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bg2);
  background:transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;color:var(--ink2);transition:all .15s}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip:hover:not(.active){border-color:var(--ink3);color:var(--ink)}
.src-row{display:flex;gap:6px}
.src-chip{flex:1;padding:7px 0;text-align:center;border-radius:9px;
  border:1.5px solid var(--bg2);background:transparent;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--ink2);transition:all .15s}
.src-chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.status-bar{display:flex;align-items:center;gap:7px;padding:7px 11px;
  border-radius:10px;background:white;font-family:'DM Mono',monospace;
  font-size:11px;color:var(--ink2);box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:background .3s,color .3s}
.status-bar.err{background:rgba(232,65,59,.07);color:var(--danger)}
.status-bar.ok{color:#3a9e5f}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stat-card{background:white;border-radius:11px;padding:10px 7px;text-align:center;
  box-shadow:var(--shadow);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-family:'DM Mono',monospace;font-size:16px;letter-spacing:-.02em}
.stat-unit{font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-lbl{font-size:10px;color:var(--ink2);margin-top:3px;font-weight:600}
.gauge-track{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:7px 0}
.gauge-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1),background 1s;width:0}
.gauge-ticks{display:flex;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3)}
.gauge-status{display:flex;align-items:center;gap:7px;margin-top:8px}
.gauge-dot{width:8px;height:8px;border-radius:50%;background:var(--ink3);flex-shrink:0;transition:background .5s}
.gauge-text{font-size:11px;font-weight:700}
.list-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px 6px}
.count-badge{font-family:'DM Mono',monospace;font-size:10px;
  background:var(--bg2);color:var(--ink2);padding:2px 8px;border-radius:20px}
.list-scroll{flex:1;overflow-y:auto;padding:0 9px 10px}
.list-scroll::-webkit-scrollbar{width:3px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:2px}
.m-item{display:flex;align-items:center;gap:9px;padding:8px 9px;
  border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.m-item:hover{background:white;box-shadow:var(--shadow);transform:translateX(-2px)}
.m-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.m-val{font-family:'DM Mono',monospace;font-size:13px}
.m-unit{font-size:8px;color:var(--ink3);margin-right:3px}
.m-loc{font-size:9px;color:var(--ink3);direction:ltr;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);flex-shrink:0}
.empty{text-align:center;padding:28px 14px;color:var(--ink3)}
.empty-icon{font-size:26px;margin-bottom:9px}
.empty-text{font-size:12px;line-height:1.6}
#map{grid-area:map;width:100%;height:100%}
.leaflet-tile-pane{filter:grayscale(15%) brightness(1.02)}
.leaflet-control-zoom{border:none!important;box-shadow:var(--shadow)!important;
  border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{background:white!important;color:var(--ink)!important;
  border:none!important;transition:background .15s!important}
.leaflet-control-zoom a:hover{background:var(--bg2)!important}
.leaflet-popup-content-wrapper{border-radius:14px!important;
  box-shadow:0 8px 32px rgba(0,0,0,.12)!important;padding:0!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip-container{display:none}
.popup{padding:14px 16px;min-width:185px}
.popup-val{font-family:'DM Mono',monospace;font-size:26px;letter-spacing:-.03em;line-height:1}
.popup-unit{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);
  text-transform:uppercase;margin-top:3px}
.popup-div{height:1px;background:var(--bg2);margin:10px 0}
.popup-meta{font-size:11px;color:var(--ink2);line-height:1.8;direction:ltr;font-family:'DM Mono',monospace}
.popup-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;
  border-radius:20px;font-size:10px;font-weight:700;margin-top:8px}
.map-legend{position:absolute;bottom:24px;right:12px;z-index:500;background:white;
  border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);
  transform:perspective(500px) rotateY(-2deg) rotateX(1deg);transition:transform .3s}
.map-legend:hover{transform:none;box-shadow:0 12px 40px rgba(0,0,0,.12)}
.leg-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--ink2)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">☢ Radiation Map</div>
    <div class="logo-sub">OpenRadiation · Safecast · Live Data</div>
  </div>
  <div class="live-pill">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveLabel">LIVE</span>
  </div>
</header>

<aside class="panel">
  <div class="sec">
    <div class="lbl">מקור נתונים</div>
    <div class="src-row">
      <button class="src-chip active" id="srcOR" onclick="setSource('openradiation')">OpenRadiation 🇪🇺</button>
      <button class="src-chip" id="srcSC" onclick="setSource('safecast')">Safecast 🇯🇵</button>
    </div>
  </div>
  <div class="sec">
    <div class="lbl">חיפוש מיקום</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="עיר, מדינה..." type="text" dir="rtl">
      <button class="btn" onclick="searchLocation()">→</button>
      <button class="btn btn-ghost" onclick="useMyLocation()" title="מיקום נוכחי">⌖</button>
    </div>
  </div>
  <div class="sec">
    <div class="lbl">מיקומים מהירים</div>
    <div class="chips" id="locChips"></div>
  </div>
  <div class="sec">
    <div class="lbl">רדיוס חיפוש</div>
    <div class="chips" id="radiusChips"></div>
  </div>
  <div class="sec">
    <div class="status-bar" id="statusBar">
      <span id="statusIcon">⏳</span><span id="statusMsg">מתחבר...</span>
    </div>
  </div>
  <div class="sec">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="sCount">—</div><div class="stat-unit">readings</div><div class="stat-lbl">מדידות</div></div>
      <div class="stat-card"><div class="stat-val" id="sAvg">—</div><div class="stat-unit">nSv/h</div><div class="stat-lbl">ממוצע</div></div>
      <div class="stat-card"><div class="stat-val" id="sMax">—</div><div class="stat-unit">nSv/h</div><div class="stat-lbl">מקסימום</div></div>
    </div>
    <div style="margin-top:10px">
      <div class="gauge-track"><div class="gauge-fill" id="gaugeFill"></div></div>
      <div class="gauge-ticks"><span>0</span><span>250</span><span>500</span><span>750</span><span>1000+</span></div>
      <div class="gauge-status">
        <div class="gauge-dot" id="gaugeDot"></div>
        <div class="gauge-text" id="gaugeText">מחכה לנתונים</div>
      </div>
    </div>
  </div>
  <div class="list-hdr">
    <div class="lbl" style="margin-bottom:0">מדידות אחרונות</div>
    <div class="count-badge" id="listCount">0</div>
  </div>
  <div class="list-scroll" id="measureList">
    <div class="empty"><div class="empty-icon">☢</div>
    <div class="empty-text">בחר מיקום כדי לטעון נתוני קרינה</div></div>
  </div>
</aside>

<div id="map"></div>

<script>
const SOURCES = {
  openradiation: {
    locations: [
      {name:'פריז', lat:48.85, lng:2.35},
      {name:'לונדון', lat:51.51, lng:-0.13},
      {name:'ברלין', lat:52.52, lng:13.40},
      {name:'מדריד', lat:40.42, lng:-3.70},
      {name:'ורשה', lat:52.23, lng:21.01},
      {name:'טוקיו', lat:35.68, lng:139.76},
    ]
  },
  safecast: {
    locations: [
      {name:'פוקושימה', lat:37.42, lng:141.03},
      {name:'טוקיו', lat:35.68, lng:139.76},
      {name:'אוסקה', lat:34.69, lng:135.50},
      {name:'פריז', lat:48.85, lng:2.35},
      {name:'ניו יורק', lat:40.71, lng:-74.01},
    ]
  }
};

const RADII = [50, 100, 200, 500];
let currentSource = 'openradiation';
let currentRadius = 100;
let currentLat = 48.85, currentLng = 2.35;
let markers = [];

// MAP
const map = L.map('map', {zoomControl:true, attributionControl:false}).setView([48.85,2.35],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {maxZoom:19, subdomains:'abcd'}).addTo(map);
L.control.attribution({prefix:false, position:'bottomleft'})
  .addAttribution('© OpenStreetMap | OpenRadiation | Safecast').addTo(map);
map.on('click', e => { currentLat=e.latlng.lat; currentLng=e.latlng.lng; loadData(); });

const legEl = document.createElement('div');
legEl.className = 'map-legend';
legEl.innerHTML = `<div class="leg-title">קרינת רקע</div>
<div class="leg-row"><div class="leg-dot" style="background:#5DB87A;box-shadow:0 0 5px #5DB87A"></div>&lt; 200 nSv/h — נורמלי</div>
<div class="leg-row"><div class="leg-dot" style="background:#F5A623;box-shadow:0 0 5px #F5A623"></div>200–600 nSv/h — מוגבר</div>
<div class="leg-row"><div class="leg-dot" style="background:#E8413B;box-shadow:0 0 5px #E8413B"></div>&gt; 600 nSv/h — גבוה</div>`;
document.getElementById('map').appendChild(legEl);

// UTILS
function cpmToNSvH(v){return Math.round(parseFloat(v)*9.55)}
function getColor(n){return n<200?'#5DB87A':n<600?'#F5A623':'#E8413B'}
function getLabel(n){return n<200?'רמה נורמלית':n<600?'רמה מוגברת':'רמה גבוהה'}
function fmtDate(s){
  if(!s)return'—';
  try{return new Date(s).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'})}
  catch{return'—'}
}
function setStatus(icon,msg,type){
  const bar=document.getElementById('statusBar');
  bar.className='status-bar '+(type||'');
  document.getElementById('statusIcon').textContent=icon;
  document.getElementById('statusMsg').textContent=msg;
  document.getElementById('liveDot').style.background=
    type==='ok'?'#5DB87A':type==='err'?'#E8413B':'#F5A623';
}
function clearMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[]}

// FETCH: OpenRadiation
async function fetchOpenRadiation(lat,lng,radius){
  // Try multiple endpoints — OR has somewhat unreliable CORS
  const base = `https://api.openradiation.net/measurements?latitude=${lat}&longitude=${lng}&distance=${radius}&limit=500`;
  const baseWithKey = base + `&apiKey=18df5f63f6a2185a1621b5c23c86f65d84be01c7`;
  const tries = [
    {url: baseWithKey, wrap: false},
    {url: `https://corsproxy.io/?${encodeURIComponent(baseWithKey)}`, wrap: false},
    {url: `https://api.allorigins.win/get?url=${encodeURIComponent(baseWithKey)}`, wrap: true},
  ];
  for(const {url,wrap} of tries){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),15000);
      const res=await fetch(url,{signal:ctrl.signal});
      clearTimeout(t);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json=await res.json();
      const raw=wrap?JSON.parse(json.contents):json;
      const arr=raw.data||raw;
      if(Array.isArray(arr)&&arr.length>0){
        return arr.map(d=>({
          id:d.id||d.reportUuid,
          nsvh:d.value?Math.round(parseFloat(d.value)):0,
          rawValue:d.value,
          unit:d.unit||'nSv/h',
          latitude:parseFloat(d.latitude),
          longitude:parseFloat(d.longitude),
          date:d.startTime||d.date||d.createdAt,
          device:d.deviceModel||d.deviceReference||'',
          country:d.country||'',
        })).filter(d=>d.nsvh>0&&!isNaN(d.latitude)&&!isNaN(d.longitude));
      }
    }catch(e){console.warn('OR failed:',e.message)}
  }
  return null;
}

// FETCH: Safecast
async function fetchSafecast(lat,lng,radius){
  const base=`https://api.safecast.org/measurements.json?latitude=${lat}&longitude=${lng}&distance=${radius}&limit=500`;
  const tries=[
    {url:`https://corsproxy.io/?${encodeURIComponent(base)}`,wrap:false},
    {url:`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`,wrap:true},
  ];
  for(const {url,wrap} of tries){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),15000);
      const res=await fetch(url,{signal:ctrl.signal});
      clearTimeout(t);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json=await res.json();
      const arr=wrap?JSON.parse(json.contents):json;
      if(Array.isArray(arr)&&arr.length>0){
        return arr.filter(d=>d.value&&d.latitude&&d.longitude).map(d=>({
          id:d.id,
          nsvh:cpmToNSvH(d.value),
          rawValue:d.value,
          unit:'cpm',
          latitude:parseFloat(d.latitude),
          longitude:parseFloat(d.longitude),
          date:d.captured_at,
          device:d.device_id?'Device #'+d.device_id:'',
          country:'',
        }));
      }
    }catch(e){console.warn('SC failed:',e.message)}
  }
  return null;
}

// MAIN LOAD
async function loadData(){
  setStatus('⏳','מתחבר...',' ');
  clearMarkers();
  resetStats();
  const fetcher=currentSource==='openradiation'?fetchOpenRadiation:fetchSafecast;
  const data=await fetcher(currentLat,currentLng,currentRadius);
  if(!data||!data.length){
    setStatus('✗','אין נתונים — נסה אזור אחר או רדיוס גדול יותר','err');
    showEmpty();
    return;
  }
  renderData(data);
}

function resetStats(){
  ['sCount','sAvg','sMax'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('gaugeFill').style.width='0';
  document.getElementById('gaugeText').textContent='מחכה לנתונים';
  document.getElementById('gaugeDot').style.background='var(--ink3)';
}

function renderData(data){
  const vals=data.map(d=>d.nsvh).filter(v=>v>0&&v<500000);
  if(!vals.length){setStatus('✗','נתונים לא תקינים','err');return}
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const max=Math.max(...vals);
  document.getElementById('sCount').textContent=data.length;
  document.getElementById('sAvg').textContent=avg.toLocaleString();
  document.getElementById('sMax').textContent=max.toLocaleString();
  const col=getColor(avg);
  document.getElementById('gaugeFill').style.width=Math.min((avg/1000)*100,100)+'%';
  document.getElementById('gaugeFill').style.background=col;
  document.getElementById('gaugeDot').style.background=col;
  document.getElementById('gaugeText').textContent=getLabel(avg)+' — '+avg.toLocaleString()+' nSv/h';
  setStatus('✓',data.length+' מדידות נטענו','ok');
  document.getElementById('listCount').textContent=data.length;

  data.forEach(p=>{
    if(!p.latitude||!p.longitude||isNaN(p.latitude)||isNaN(p.longitude))return;
    const c=getColor(p.nsvh);
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2px solid white;box-shadow:0 0 7px ${c},0 2px 5px rgba(0,0,0,.2);cursor:pointer"></div>`,
      iconSize:[12,12],iconAnchor:[6,6]
    });
    const m=L.marker([p.latitude,p.longitude],{icon})
      .bindPopup(makePopup(p),{maxWidth:240})
      .addTo(map);
    markers.push(m);
  });

  const sorted=[...data].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const list=document.getElementById('measureList');
  list.innerHTML=sorted.slice(0,80).map(p=>`
    <div class="m-item" onclick="map.flyTo([${p.latitude},${p.longitude}],Math.max(map.getZoom(),12),{duration:1})">
      <div class="m-dot" style="background:${getColor(p.nsvh)};box-shadow:0 0 5px ${getColor(p.nsvh)}"></div>
      <div style="flex:1;min-width:0">
        <div class="m-val">${p.nsvh.toLocaleString()}<span class="m-unit">nSv/h</span></div>
        <div class="m-loc">${p.latitude.toFixed(3)}, ${p.longitude.toFixed(3)}${p.country?' · '+p.country:''}</div>
      </div>
      <div class="m-date">${fmtDate(p.date)}</div>
    </div>`).join('');
}

function makePopup(p){
  const c=getColor(p.nsvh);
  return`<div class="popup">
    <div class="popup-val">${p.nsvh.toLocaleString()}</div>
    <div class="popup-unit">nSv/h${p.unit!=='nSv/h'?' · '+parseFloat(p.rawValue).toFixed(1)+' '+p.unit:''}</div>
    <div class="popup-div"></div>
    <div class="popup-meta">
      <div>📍 ${p.latitude.toFixed(4)}, ${p.longitude.toFixed(4)}</div>
      <div>📅 ${fmtDate(p.date)}</div>
      ${p.device?'<div>📡 '+p.device+'</div>':''}
      ${p.country?'<div>🌍 '+p.country+'</div>':''}
    </div>
    <div class="popup-badge" style="background:${c}18;color:${c}">${getLabel(p.nsvh)}</div>
  </div>`;
}

function showEmpty(){
  document.getElementById('measureList').innerHTML=`
    <div class="empty"><div class="empty-icon">☢</div>
    <div class="empty-text">אין מדידות באזור זה.<br>נסה רדיוס גדול יותר<br>או מיקום אחר.</div></div>`;
  document.getElementById('listCount').textContent='0';
}

// SOURCE
function setSource(src){
  currentSource=src;
  document.getElementById('srcOR').className='src-chip'+(src==='openradiation'?' active':'');
  document.getElementById('srcSC').className='src-chip'+(src==='safecast'?' active':'');
  const locs=SOURCES[src].locations;
  currentLat=locs[0].lat; currentLng=locs[0].lng;
  map.setView([currentLat,currentLng],src==='safecast'?8:6);
  buildLocChips();
  loadData();
}

// LOC CHIPS
function buildLocChips(){
  const c=document.getElementById('locChips');
  c.innerHTML=SOURCES[currentSource].locations.map((l,i)=>
    `<button class="chip${i===0?' active':''}" onclick="selectLoc(${l.lat},${l.lng},this)">${l.name}</button>`
  ).join('');
}
function selectLoc(lat,lng,el){
  document.querySelectorAll('#locChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentLat=lat; currentLng=lng;
  map.setView([lat,lng],currentSource==='safecast'?8:6);
  loadData();
}

// RADIUS CHIPS
function buildRadiusChips(){
  const c=document.getElementById('radiusChips');
  c.innerHTML=RADII.map(r=>
    `<button class="chip${r===currentRadius?' active':''}" onclick="setRadius(${r},this)">${r}km</button>`
  ).join('');
}
function setRadius(r,el){
  currentRadius=r;
  document.querySelectorAll('#radiusChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  loadData();
}

// SEARCH
async function searchLocation(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  setStatus('⏳','מחפש '+q+'...',' ');
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data=await res.json();
    if(data&&data[0]){
      currentLat=parseFloat(data[0].lat); currentLng=parseFloat(data[0].lon);
      map.setView([currentLat,currentLng],8);
      loadData();
    }else setStatus('✗','מיקום לא נמצא','err');
  }catch(e){setStatus('✗','שגיאת חיפוש','err')}
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchLocation()});
function useMyLocation(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLat=pos.coords.latitude; currentLng=pos.coords.longitude;
    map.setView([currentLat,currentLng],9);
    loadData();
  });
}

// INIT
buildLocChips();
buildRadiusChips();
loadData();
</script>
</body>
</html>
